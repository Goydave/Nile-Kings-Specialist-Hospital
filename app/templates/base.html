<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nile Kings Specialist Hospital</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <!-- Header/Navbar -->
    <!-- Header/Navbar -->
    <nav class="navbar navbar-expand-lg py-3 shadow-sm" style="background-color: #137be9;">
        <div class="container d-flex justify-content-between align-items-center">

            <!-- Logo Text -->
            <a class="navbar-brand fw-bold fs-4 d-flex align-items-center" href="/" style="color: #0c2b4b;">
                <span class="me-2" style="font-size: 1.5rem;">👑</span> 
                <div>
                    <div class="fw-bold" style="line-height: 1;">Nile Kings</div>
                    <small class="text-muted" style="font-size: 0.75rem;">Specialist Hospital</small>
                </div>
            </a>

            <!-- Toggler for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse justify-content-end align-items-center" id="navMenu">
                <ul class="navbar-nav mb-2 mb-lg-0 me-3">
                    <li class="nav-item"><a class="nav-link fw-semibold" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold" href="/services">Services</a></li>
                    
                    <li class="nav-item"><a class="nav-link fw-semibold" href="/contact">Contact</a></li>
                </ul>

                <!-- Call and Appointment Buttons -->
                <div class="d-flex gap-2">
                    <a href="tel:+256712345678" class="btn text-white px-3" style="background: linear-gradient(to right, #00b4db, #009688); border-radius: 25px;">
                        <i class="fas fa-phone-alt me-2"></i> +211 915 656 562
                    </a>
                    <a href="/appointment" class="btn text-white px-3" style="background: linear-gradient(to right, #00c9a7, #00b4db); border-radius: 25px;">
                        <i class="fas fa-calendar-alt me-2"></i> Appointment
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
